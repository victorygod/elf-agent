<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elf - AI Agent 平台</title>
  <link rel="stylesheet" href="style.css">
  <script>
    function resizeConfigFrame() {
      const frame = document.getElementById('configFormFrame');
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        // 根据 iframe 内容高度自适应，多留 4px 避免截断
        frame.style.height = doc.documentElement.scrollHeight + 4 + 'px';
      } catch (e) {}
    }
  </script>
</head>
<body>

  <!-- 左侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title-row">
        <h1>Elf</h1>
        <button class="btn-icon btn-icon-sm" onclick="refreshAgentList()" title="刷新状态">↻</button>
      </div>
      <div class="subtitle">AI Agent 平台</div>
    </div>
    <div class="agent-list" id="agentList"></div>
  </div>

  <!-- 右侧主区域 -->
  <div class="main-area" id="mainArea">
    <!-- 顶部栏 -->
    <div class="top-bar" id="topBar" style="display: none;">
      <button class="back-btn" id="backBtn" onclick="goBackToList()">←</button>
      <div class="title" id="topTitle">elf-001</div>
      <div class="actions">
        <button class="btn-icon" id="btnConfig" onclick="openConfig()" title="配置">⚙</button>
      </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state">
        <div class="icon">💬</div>
        <div class="text">选择一个 Agent 开始对话</div>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area" id="inputArea" style="display: none;">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="输入消息..." rows="1"
                  onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- 配置面板 -->
  <div class="config-overlay" id="configOverlay" onclick="closeConfig()"></div>
  <div class="config-panel" id="configPanel">
    <div class="config-header">
      <h2>Agent 配置</h2>
      <div class="config-header-actions">
        <button class="btn btn-primary btn-sm" id="cfgBtnStart" onclick="startAgent()">启动服务</button>
        <button class="btn btn-danger btn-sm" id="cfgBtnStop" onclick="stopAgent()" style="display:none;">停止服务</button>
        <button class="config-close" onclick="closeConfig()">✕</button>
      </div>
    </div>
    <div class="config-body">
      <!-- 配置表单：由 Agent config-ui.html 动态加载（含头像上传） -->
      <iframe id="configFormFrame" onload="resizeConfigFrame()"></iframe>
    </div>
    <div class="config-footer">
      <button class="btn btn-warning btn-sm" onclick="clearChatHistory()">清空聊天记录</button>
      <button class="btn btn-warning btn-sm" onclick="clearMemory()">清空记忆</button>
      <span style="flex:1"></span>
      <button class="btn" onclick="closeConfig()">取消</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
