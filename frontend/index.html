<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elf - AI Agent 平台</title>
  <link rel="stylesheet" href="style.css">
  <script>
    function resizeConfigFrame() {
      const frame = document.getElementById('configFormFrame');
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        frame.style.height = doc.documentElement.scrollHeight + 4 + 'px';
      } catch (e) {}
    }
  </script>
</head>
<body>

  <!-- 左侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title-row">
        <h1>Elf</h1>
        <button class="btn-icon btn-icon-sm" onclick="refreshAgentList()" title="刷新状态">↻</button>
      </div>
      <div class="subtitle">AI Agent 平台</div>
    </div>
    <div class="agent-list" id="agentList"></div>
  </div>

  <!-- 右侧主区域 -->
  <div class="main-area" id="mainArea">
    <!-- 顶部栏 -->
    <div class="top-bar hidden" id="topBar">
      <button class="back-btn" id="backBtn" onclick="goBackToList()"><</button>
      <div class="title" id="topTitle">Elf</div>
      <div class="actions">
        <button class="btn-icon" id="btnConfig" onclick="openConfig()" title="配置"></button>
      </div>
    </div>

    <!-- 聊天区域容器（AgentChat 实例的 .agent-chat 挂载点） -->
    <div class="chat-area" id="chatArea"></div>

    <!-- 输入区域由每个 AgentChat 实例自带，此处不再放全局输入框 -->
  </div>

  <!-- 配置面板 -->
  <div class="config-overlay" id="configOverlay"></div>
  <div class="config-panel" id="configPanel">
    <div class="config-header">
      <button class="config-back-btn" onclick="closeConfig()"><</button>
      <h2>Agent 配置</h2>
      <div class="config-header-actions">
        <button class="btn btn-primary btn-sm" id="cfgBtnStart" onclick="startAgent()">启动服务</button>
        <button class="btn btn-danger btn-sm hidden" id="cfgBtnStop" onclick="stopAgent()">停止服务</button>
      </div>
    </div>
    <div class="config-body">
      <iframe id="configFormFrame" onload="resizeConfigFrame()"></iframe>
    </div>
    <div class="config-footer">
      <button class="btn btn-warning btn-sm" onclick="clearChatHistory()">清空聊天记录</button>
      <button class="btn btn-warning btn-sm" onclick="clearMemory()">清空记忆</button>
      <span style="flex:1"></span>
      <button class="btn" onclick="closeConfig()">取消</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存</button>
    </div>
  </div>

  <!-- ===== 模板 ===== -->

  <!-- Agent 列表项 -->
  <template id="tmplAgentItem">
    <div class="agent-item" data-agent-id="">
      <div class="agent-avatar"></div>
      <div class="agent-info">
        <div class="agent-name"></div>
        <div class="agent-path"></div>
        <div class="agent-status"><span class="agent-status-dot"></span><span class="status-text"></span></div>
      </div>
    </div>
  </template>

  <!-- 用户消息气泡 -->
  <template id="tmplMsgUser">
    <div class="message user" data-msg-id="">
      <div class="message-avatar"><span class="avatar-default">U</span></div>
      <div class="message-body">
        <div class="message-time"></div>
        <div class="message-bubble"></div>
      </div>
    </div>
  </template>

  <!-- AI 消息气泡 -->
  <template id="tmplMsgAssistant">
    <div class="message assistant" data-msg-id="">
      <div class="message-avatar"><span class="avatar-default">A</span></div>
      <div class="message-body">
        <div class="message-time"></div>
        <div class="message-bubble"></div>
      </div>
    </div>
  </template>

  <!-- 系统消息 -->
  <template id="tmplMsgSystem">
    <div class="message system" data-msg-id="">
      <div class="message-bubble"></div>
    </div>
  </template>

  <!-- 压缩标记 -->
  <template id="tmplCompactLoading">
    <div class="compact-badge compact-loading" id="compactBadge">⏳ 记忆压缩中...</div>
  </template>

  <!-- 打字指示器 -->
  <template id="tmplTypingIndicator">
    <div class="message assistant" id="typingIndicator">
      <div class="message-avatar"><span class="avatar-default">A</span></div>
      <div class="message-body">
        <div class="message-bubble">
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
  </template>

  <!-- 流式消息外壳 -->
  <template id="tmplStreamingMsg">
    <div class="message assistant" id="streamingMsg">
      <div class="message-avatar"><span class="avatar-default">A</span></div>
      <div class="message-body">
        <div class="message-time"></div>
        <div class="message-bubble"></div>
      </div>
    </div>
  </template>

  <!-- 空状态 -->
  <template id="tmplEmptyState">
    <div class="empty-state">
      <div class="text"></div>
    </div>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
